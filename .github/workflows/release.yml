name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: pdf_toolbox
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            platform: windows
            arch: x64
          - label: macOS x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - label: macOS arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run build

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cp target/release/pdf_toolbox.exe \
              "dist/${APP_NAME}-${VERSION}-windows-${{ matrix.arch }}-portable.exe"

            INSTALLER="$(find target/release/bundle/nsis -maxdepth 1 -type f -name '*.exe' 2>/dev/null | head -n 1 || true)"
            if [[ -z "${INSTALLER}" ]]; then
              echo "Windows installer was not found in target/release/bundle/nsis"
              exit 1
            fi
            cp "${INSTALLER}" \
              "dist/${APP_NAME}-${VERSION}-windows-${{ matrix.arch }}-setup.exe"
          fi

          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            DMG="$(find target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' 2>/dev/null | head -n 1 || true)"
            if [[ -z "${DMG}" ]]; then
              echo "macOS dmg was not found in target/release/bundle/dmg"
              exit 1
            fi
            cp "${DMG}" \
              "dist/${APP_NAME}-${VERSION}-macos-${{ matrix.arch }}.dmg"
          fi

          ls -la dist

      - name: Upload release files
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
