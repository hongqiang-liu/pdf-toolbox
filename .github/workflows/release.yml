name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact_name: pdf_toolbox-windows-x64.exe
            binary_path: target/release/pdf_toolbox.exe
          - label: macOS arm64
            os: macos-latest
            artifact_name: pdf_toolbox-macos-arm64
            binary_path: target/release/pdf_toolbox
          - label: macOS x64
            os: macos-13
            artifact_name: pdf_toolbox-macos-x64
            binary_path: target/release/pdf_toolbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build single binary
        run: cargo build -p pdf_toolbox --release --locked

      - name: Rename single binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload single binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeDebug: false
