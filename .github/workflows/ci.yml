name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-and-tauri:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Rust
        run: cargo check -p pdf_toolbox --locked

      - name: Lint Rust
        run: cargo clippy -p pdf_toolbox --all-targets --locked -- -D warnings

      - name: Build release binary
        run: cargo build -p pdf_toolbox --release --locked

      - name: Upload Windows single exe
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pdf_toolbox-windows-x64-single-exe
          path: target/release/pdf_toolbox.exe
          if-no-files-found: error

      - name: Upload macOS binary
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pdf_toolbox-macos-binary
          path: target/release/pdf_toolbox
          if-no-files-found: error

