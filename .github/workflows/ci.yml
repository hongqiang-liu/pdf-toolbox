name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-and-tauri:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact_name: pdf_toolbox-ci-windows-x64-portable
            artifact_path: target/release/pdf_toolbox.exe
          - label: macOS x64
            os: macos-15-intel
            artifact_name: pdf_toolbox-ci-macos-x64-binary
            artifact_path: target/release/pdf_toolbox
          - label: macOS arm64
            os: macos-15
            artifact_name: pdf_toolbox-ci-macos-arm64-binary
            artifact_path: target/release/pdf_toolbox

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Rust
        run: cargo check -p pdf_toolbox --locked

      - name: Lint Rust
        run: cargo clippy -p pdf_toolbox --all-targets --locked -- -D warnings

      - name: Build release binary
        run: cargo build -p pdf_toolbox --release --locked

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
